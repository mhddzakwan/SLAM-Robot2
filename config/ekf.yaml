ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link # Sesuaikan ke base_footprint jika di URDF ada link tersebut
    world_frame: odom

    # --- INPUT 1: Odometri Roda ---
    odom0: /diff_drive_controller/odom # Disesuaikan dengan topik default diff_drive_controller
    odom0_config: [
        true,
        true,
        false, # Mengambil estimasi posisi X dan Y dari roda
        false,
        false,
        true, # Mengambil estimasi orientasi Yaw dari roda
        true,
        false,
        false, # Mengambil kecepatan linear X (Maju/Mundur)
        false,
        false,
        true, # Mengambil kecepatan angular Z (Berputar)
        false,
        false,
        false,
      ]
    odom0_differential: false
    odom0_relative: false

    # --- INPUT 2: Sensor IMU ---
    imu0: /imu/data_raw
    imu0_config: [
        false,
        false,
        false,
        false,
        false,
        true, # Mengambil orientasi Yaw (Sudut hadap) dari IMU
        false,
        false,
        false,
        false,
        false,
        true, # Mengambil kecepatan angular Z (Yaw rate) dari IMU
        false,
        false,
        false,
      ]
    imu0_differential: false
    imu0_relative: true # DIUBAH KE TRUE: Agar orientasi awal IMU dianggap 0 saat robot booting
